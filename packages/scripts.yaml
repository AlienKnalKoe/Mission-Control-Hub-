##############################################################
# SCRIPTS — Screen cycle automation
##############################################################

script:
  - id: screen_cycle_timer
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return true;'
          then:
            - delay: 5s
            - if:
                condition:
                  lambda: 'return !id(touch_active);'
                then:
                  - script.execute: next_screen
  - id: idle_dimmer_script
    mode: restart
    then:
      - delay: 60s
      - light.control:
          id: display_backlight
          brightness: 0.1 # Dims the screen after 60s of no touch
          
  - id: next_screen
    then:
      - lambda: 'id(current_screen) = (id(current_screen) + 1) % 3;'
      - if:
          condition:
            lambda: 'return id(current_screen) == 0;'
          then:
            - lvgl.tileview.select:
                id: main_nav
                tile_id: screen_energy
                animated: true
      - if:
          condition:
            lambda: 'return id(current_screen) == 1;'
          then:
            - lvgl.tileview.select:
                id: main_nav
                tile_id: screen_weather
                animated: true
      - if:
          condition:
            lambda: 'return id(current_screen) == 2;'
          then:
            - lvgl.tileview.select:
                id: main_nav
                tile_id: screen_status
                animated: true
