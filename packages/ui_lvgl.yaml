##############################################################
# UI — LVGL multi-screen tileview
##############################################################

lvgl:
  touchscreens: touch
  disp_bg_color: 0x000000

  pages:
    - id: page_main
      widgets:
        - tileview:
            id: main_nav
            on_press:
              then:
                - lambda: 'id(touch_active) = true;'
                - script.execute: screen_cycle_timer
                - delay: 10s
                - lambda: 'id(touch_active) = false;'
            tiles:

              # ── SCREEN 1: ENERGY ARCS ───────────────────────────────
              - id: screen_energy
                row: 0
                column: 0
                widgets:
                  - label:
                      text: "HOUSE POWER"
                      align: TOP_MID
                      y: 20
                      text_font: font_medium

                  # Usage Arc — red — consumption (left)
                  - arc:
                      id: usage_arc
                      min_value: 0
                      max_value: ${max_power_usage}
                      width: 180
                      height: 180
                      align: CENTER
                      x: -100
                      y: -20
                      rotation: 135
                      start_angle: 135
                      end_angle: 45
                      indicator:
                        arc_color: 0xFF0000
                      widgets:
                        - label:
                            id: usage_val_label
                            text: "--- W"
                            align: CENTER
                            text_font: font_small

                  # Solar Arc — green — production (right)
                  - arc:
                      id: solar_arc
                      min_value: 0
                      max_value: ${max_solar_production}
                      width: 180
                      height: 180
                      align: CENTER
                      x: 100
                      y: 60
                      rotation: 135
                      start_angle: 135
                      end_angle: 45
                      indicator:
                        arc_color: 0x00FF00
                      widgets:
                        - label:
                            id: solar_val_label
                            text: "--- W"
                            align: CENTER
                            text_font: font_small

                  - label:
                      text: "\U000F02D7" # home-lightning-bolt
                      align: CENTER
                      x: -100
                      y: -80
                      text_font: font_icons
                      text_color: 0xFF0000

                  - label:
                      text: "\U000F059D" # sunny
                      align: CENTER
                      x: 100
                      y: 0
                      text_font: font_icons
                      text_color: 0x00FF00

              # ── SCREEN 2: WEATHER & PRICE ───────────────────────────
              - id: screen_weather
                row: 0
                column: 1
                widgets:
                  - label:
                      text: "ENVIRONMENT"
                      align: TOP_MID
                      y: 20
                      text_font: font_medium

                  # Temperature arc — blue
                  - arc:
                      id: temp_arc
                      min_value: -10
                      max_value: 40
                      width: 220
                      height: 220
                      align: CENTER
                      y: -30
                      rotation: 135
                      start_angle: 135
                      end_angle: 45
                      indicator:
                        arc_color: 0x00AAFF
                      widgets:
                        - label:
                            id: temp_val_label
                            text: "--°C"
                            align: CENTER
                            text_font: font_large
                        - label:
                            id: weather_val_label
                            text: "Loading..."
                            align: CENTER
                            y: 40
                            text_font: font_small

                  # Energy price panel
                  - obj:
                      width: 300
                      height: 80
                      align: BOTTOM_MID
                      y: -40
                      bg_color: 0x1A1A1A
                      border_width: 2
                      border_color: 0x333333
                      radius: 10
                      widgets:
                        - label:
                            text: "\U000F0190" # euro icon
                            align: LEFT_MID
                            x: 20
                            text_font: font_icons
                            text_color: 0xFFFF00
                        - label:
                            id: price_val_label
                            text: "--- €"
                            align: RIGHT_MID
                            x: -20
                            text_font: font_medium
                            text_color: 0xFFFFFF

              # ── SCREEN 3: DEVICE STATUS — Multi-Arc Meter ──────────
              - id: screen_status
                row: 0
                column: 2
                bg_color: 0x000000
                widgets:
                  - label:
                      text: "DEVICE STATUS"
                      align: TOP_MID
                      y: 20
                      text_font: font_medium
                      text_color: 0xFFFFFF

                  # Multi-arc meter (300×300, centred)
                  # Arc 1 (outer)  — red   — CPU temp   (0–${max_cpu_temp}°C)
                  # Arc 2 (middle) — green — Uptime     (0–${max_uptime_hours}h)
                  # Arc 3 (inner)  — blue  — WiFi signal (0–100%)
                  - meter:
                      id: mission_control_meter
                      align: CENTER
                      y: -10
                      width: 300
                      height: 300
                      bg_opa: 0%
                      border_width: 0
                      pad_all: 0
                      scales:
                        - range_from: 0
                          range_to: ${max_cpu_temp}
                          angle_range: 300
                          rotation: 120
                          ticks:
                            count: 0
                            length: 0
                          indicators:
                            - arc:
                                id: cpu_temp_arc
                                color: 0xFF4444
                                width: 14
                                r_mod: 0
                                value: 0
                        - range_from: 0
                          range_to: ${max_uptime_hours}
                          angle_range: 300
                          rotation: 120
                          ticks:
                            count: 0
                            length: 0
                          indicators:
                            - arc:
                                id: uptime_arc
                                color: 0x44FF88
                                width: 14
                                r_mod: -20
                                value: 0
                        - range_from: 0
                          range_to: 100
                          angle_range: 300
                          rotation: 120
                          ticks:
                            count: 0
                            length: 0
                          indicators:
                            - arc:
                                id: wifi_signal_arc
                                color: 0x4488FF
                                width: 14
                                r_mod: -40
                                value: 0

                  # Legend — below the meter
                  - obj:
                      align: BOTTOM_MID
                      y: -15
                      width: 440
                      height: 90
                      bg_opa: 0%
                      border_width: 0
                      widgets:
                        # Row 1: CPU Temp
                        - label:
                            text: "\U000F050F" # thermometer
                            align: TOP_LEFT
                            x: 30
                            y: 0
                            text_font: font_icons
                            text_color: 0xFF4444
                        - label:
                            text: "CPU Temp"
                            align: TOP_LEFT
                            x: 70
                            y: 8
                            text_font: font_small
                            text_color: 0xFF4444
                        - label:
                            id: meter_val1_label
                            text: "--°C"
                            align: TOP_RIGHT
                            x: -30
                            y: 8
                            text_font: font_small
                            text_color: 0xFF4444

                        # Row 2: Uptime
                        - label:
                            text: "\U000F0019" # flash
                            align: TOP_LEFT
                            x: 30
                            y: 30
                            text_font: font_icons
                            text_color: 0x44FF88
                        - label:
                            text: "Uptime"
                            align: TOP_LEFT
                            x: 70
                            y: 38
                            text_font: font_small
                            text_color: 0x44FF88
                        - label:
                            id: meter_val2_label
                            text: "--h"
                            align: TOP_RIGHT
                            x: -30
                            y: 38
                            text_font: font_small
                            text_color: 0x44FF88

                        # Row 3: WiFi Signal
                        - label:
                            text: "\U000F05A9" # wifi
                            align: TOP_LEFT
                            x: 30
                            y: 60
                            text_font: font_icons
                            text_color: 0x4488FF
                        - label:
                            text: "WiFi"
                            align: TOP_LEFT
                            x: 70
                            y: 68
                            text_font: font_small
                            text_color: 0x4488FF
                        - label:
                            id: meter_val3_label
                            text: "--%"
                            align: TOP_RIGHT
                            x: -30
                            y: 68
                            text_font: font_small
                            text_color: 0x4488FF
