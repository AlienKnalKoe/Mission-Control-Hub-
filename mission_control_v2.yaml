##############################################################
# ENERGY MISSION CONTROL V2 — Graphical Edition
# ESP32-4848S040 (Guition) | LVGL Gauges & Arcs
##############################################################

substitutions:
  device_name: energy-mission-control
  friendly_name: Energy Mission Control
  timezone: "Europe/Amsterdam"
  # Adjust these to match your typical peak values
  max_power_usage: "5000"       # W
  max_solar_production: "4000"  # W
  max_cpu_temp: "80"            # °C — ESP32 throttles above ~80°C
  max_wifi_rssi: "100"          # 0-100% mapped from RSSI
  max_uptime_hours: "168"       # 1 week = 100% on uptime arc

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - script.execute: screen_cycle_timer

packages:
  hardware_core: !include packages/hardware_core.yaml
  fonts:        !include packages/fonts.yaml
  globals:      !include packages/globals.yaml
  sensors:      !include packages/sensors.yaml
  scripts:      !include packages/scripts.yaml
  ui_lvgl:      !include packages/ui_lvgl.yaml

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} Fallback"
    password: "energyhub123"

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

time:
  - platform: sntp
    id: sntp_time
    timezone: "${timezone}"
