##############################################################
# ENERGY MISSION CONTROL V2 — Graphical Edition
# ESP32-4848S040 (Guition) | LVGL Gauges & Arcs
##############################################################

substitutions:
  device_name: energy-mission-control
  friendly_name: Energy Mission Control
  timezone: "Europe/Amsterdam"
  # Adjust these based on your typical max values
  max_power_usage: "5000" 
  max_solar_production: "4000"
  # Multi-arc meter ranges
  max_cpu_temp: "80"       # °C — ESP32 throttles above ~80°C
  max_wifi_rssi: "100"     # Used for 0-100% mapping of WiFi signal
  max_uptime_hours: "168"  # 1 week = 100% on uptime arc

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - script.execute: screen_cycle_timer

packages:
  hardware_core: !include packages/hardware_core.yaml

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} Fallback"
    password: "energyhub123"

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

time:
  - platform: sntp
    id: sntp_time
    timezone: "${timezone}"

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 18
  - file: "gfonts://Roboto"
    id: font_medium
    size: 28
  - file: "gfonts://Roboto"
    id: font_large
    size: 48
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: font_icons
    size: 32
    glyphs:
      - "\U000F059D" # sunny
      - "\U000F0019" # flash
      - "\U000F0190" # currency-eur
      - "\U000F050F" # thermometer
      - "\U000F02D7" # home-lightning-bolt
      - "\U000F05A9" # wifi

globals:
  - id: current_screen
    type: int
    initial_value: '0'
  - id: touch_active
    type: bool
    initial_value: 'false'
  - id: uptime_hours
    type: float
    initial_value: '0.0'

sensor:
  # Energy Usage
  - platform: homeassistant
    id: energy_usage
    entity_id: sensor.electricity_meter_energieverbruik
    on_value:
      then:
        - lvgl.arc.update:
            id: usage_arc
            value: !lambda "return (int)x;"
        - lvgl.label.update:
            id: usage_val_label
            text: !lambda 'return str_sprintf("%.0f W", x);'

  # Solar Production
  - platform: homeassistant
    id: energy_production
    entity_id: sensor.electricity_meter_energieproductie
    on_value:
      then:
        - lvgl.arc.update:
            id: solar_arc
            value: !lambda "return (int)x;"
        - lvgl.label.update:
            id: solar_val_label
            text: !lambda 'return str_sprintf("%.0f W", x);'

  # Current Price
  - platform: homeassistant
    id: energy_price
    entity_id: sensor.current_electricity_price_all_in
    on_value:
      then:
        - lvgl.label.update:
            id: price_val_label
            text: !lambda 'return str_sprintf("%.3f €", x);'

  # Temperatures
  - platform: homeassistant
    id: temp_outdoor
    entity_id: weather.forecast_thuis
    attribute: temperature
    on_value:
      then:
        - lvgl.label.update:
            id: temp_val_label
            text: !lambda 'return str_sprintf("%.1f°C", x);'

  # ── Multi-Arc Meter Sensors ────────────────────────────────
  # ESP32 Internal Temperature
  - platform: internal_temperature
    id: cpu_temp
    name: "ESP32 Internal Temperature"
    update_interval: 10s
    on_value:
      then:
        - lvgl.indicator.update:
            id: cpu_temp_arc
            value: !lambda "return (int)min(x, (float)${max_cpu_temp});"
        - lvgl.label.update:
            id: meter_val1_label
            text: !lambda 'return str_sprintf("%.0f°C", x);'

  # WiFi Signal Strength (RSSI → 0-100%)
  - platform: wifi_signal
    id: wifi_rssi
    name: "WiFi Signal"
    update_interval: 30s
    filters:
      # Map RSSI (-100 dBm … -50 dBm) to 0-100
      - lambda: "return (int)((x + 100.0f) * 2.0f);"
    on_value:
      then:
        - lvgl.indicator.update:
            id: wifi_signal_arc
            value: !lambda "return (int)clamp(x, 0.0f, 100.0f);"
        - lvgl.label.update:
            id: meter_val3_label
            text: !lambda 'return str_sprintf("%.0f%%", clamp(x, 0.0f, 100.0f));'

  # Uptime (seconds → hours, mapped to 0-168 for 1-week arc)
  - platform: uptime
    id: uptime_sensor
    name: "Uptime"
    update_interval: 60s
    on_value:
      then:
        - lambda: "id(uptime_hours) = x / 3600.0f;"
        - lvgl.indicator.update:
            id: uptime_arc
            value: !lambda "return (int)min(id(uptime_hours), (float)${max_uptime_hours});"
        - lvgl.label.update:
            id: meter_val2_label
            text: !lambda |-
              float h = x / 3600.0f;
              if (h < 1.0f)
                return str_sprintf("%.0fm", x / 60.0f);
              return str_sprintf("%.1fh", h);

text_sensor:
  - platform: homeassistant
    id: weather_condition
    entity_id: weather.forecast_thuis
    on_value:
      then:
        - lvgl.label.update:
            id: weather_val_label
            text: !lambda 'return x.c_str();'

script:
  - id: screen_cycle_timer
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return true;'
          then:
            - delay: 5s
            - if:
                condition:
                  lambda: 'return !id(touch_active);'
                then:
                  - script.execute: next_screen

  - id: next_screen
    then:
      - lambda: 'id(current_screen) = (id(current_screen) + 1) % 3;'
      - if:
          condition:
            lambda: 'return id(current_screen) == 0;'
          then:
            - lvgl.tileview.select:
                id: main_nav
                tile_id: screen_energy
                animated: true
      - if:
          condition:
            lambda: 'return id(current_screen) == 1;'
          then:
            - lvgl.tileview.select:
                id: main_nav
                tile_id: screen_weather
                animated: true
      - if:
          condition:
            lambda: 'return id(current_screen) == 2;'
          then:
            - lvgl.tileview.select:
                id: main_nav
                tile_id: screen_status
                animated: true

lvgl:
  touchscreens: touch
  disp_bg_color: 0x000000

  pages:
    - id: page_main
      widgets:
        - tileview:
            id: main_nav
            on_press:
              then:
                - lambda: 'id(touch_active) = true;'
                - script.execute: screen_cycle_timer
                - delay: 10s
                - lambda: 'id(touch_active) = false;'
            tiles:
              # SCREEN 1: ENERGY ARCS
              - id: screen_energy
                row: 0
                column: 0
                widgets:
                  - label:
                      text: "HOUSE POWER"
                      align: TOP_MID
                      y: 20
                      text_font: font_medium
                  
                  # Usage Arc (Left/Top)
                  - arc:
                      id: usage_arc
                      min_value: 0
                      max_value: ${max_power_usage}
                      width: 180
                      height: 180
                      align: CENTER
                      x: -100
                      y: -20
                      rotation: 135
                      start_angle: 135
                      end_angle: 45
                      indicator:
                        arc_color: 0xFF0000 # Red for consumption
                      widgets:
                        - label:
                            id: usage_val_label
                            text: "--- W"
                            align: CENTER
                            text_font: font_small

                  # Solar Arc (Right/Bottom)
                  - arc:
                      id: solar_arc
                      min_value: 0
                      max_value: ${max_solar_production}
                      width: 180
                      height: 180
                      align: CENTER
                      x: 100
                      y: 60
                      rotation: 135
                      start_angle: 135
                      end_angle: 45
                      indicator:
                        arc_color: 0x00FF00 # Green for solar
                      widgets:
                        - label:
                            id: solar_val_label
                            text: "--- W"
                            align: CENTER
                            text_font: font_small

                  - label:
                      text: "\U000F02D7" # home-lightning-bolt
                      align: CENTER
                      x: -100
                      y: -80
                      text_font: font_icons
                      text_color: 0xFF0000

                  - label:
                      text: "\U000F059D" # sunny
                      align: CENTER
                      x: 100
                      y: 0
                      text_font: font_icons
                      text_color: 0x00FF00

              # SCREEN 2: WEATHER & PRICE GAUGES
              - id: screen_weather
                row: 0
                column: 1
                widgets:
                  - label:
                      text: "ENVIRONMENT"
                      align: TOP_MID
                      y: 20
                      text_font: font_medium

                  # Temperature Gauge (Visualized as an Arc)
                  - arc:
                      id: temp_arc
                      min_value: -10
                      max_value: 40
                      width: 220
                      height: 220
                      align: CENTER
                      y: -30
                      rotation: 135
                      start_angle: 135
                      end_angle: 45
                      indicator:
                        arc_color: 0x00AAFF
                      widgets:
                        - label:
                            id: temp_val_label
                            text: "--°C"
                            align: CENTER
                            text_font: font_large
                        - label:
                            id: weather_val_label
                            text: "Loading..."
                            align: CENTER
                            y: 40
                            text_font: font_small

                  # Price Section
                  - obj:
                      width: 300
                      height: 80
                      align: BOTTOM_MID
                      y: -40
                      bg_color: 0x1A1A1A
                      border_width: 2
                      border_color: 0x333333
                      radius: 10
                      widgets:
                        - label:
                            text: "\U000F0190" # Euro icon
                            align: LEFT_MID
                            x: 20
                            text_font: font_icons
                            text_color: 0xFFFF00
                        - label:
                            id: price_val_label
                            text: "--- €"
                            align: RIGHT_MID
                            x: -20
                            text_font: font_medium
                            text_color: 0xFFFFFF

              # ── SCREEN 3: DEVICE STATUS — Multi-Arc Meter ──────────────
              - id: screen_status
                row: 0
                column: 2
                bg_color: 0x000000
                widgets:
                  - label:
                      text: "DEVICE STATUS"
                      align: TOP_MID
                      y: 20
                      text_font: font_medium
                      text_color: 0xFFFFFF

                  # ── Multi-Arc Meter (300×300, centred on 480×480 screen) ──
                  # Arc 1 (outermost)  — red    — ESP32 CPU temperature (0-80°C)
                  # Arc 2 (middle)     — green  — Device uptime (0-168 h = 1 week)
                  # Arc 3 (innermost)  — blue   — WiFi signal strength (0-100%)
                  - meter:
                      id: mission_control_meter
                      align: CENTER
                      y: -10
                      width: 300
                      height: 300
                      bg_opa: 0%
                      border_width: 0
                      pad_all: 0
                      scales:
                        - range_from: 0
                          range_to: ${max_cpu_temp}
                          angle_range: 300
                          rotation: 120
                          ticks:
                            count: 0
                            length: 0
                          indicators:
                            - arc:
                                id: cpu_temp_arc
                                color: 0xFF4444
                                width: 14
                                r_mod: 0
                                value: 0
                        - range_from: 0
                          range_to: ${max_uptime_hours}
                          angle_range: 300
                          rotation: 120
                          ticks:
                            count: 0
                            length: 0
                          indicators:
                            - arc:
                                id: uptime_arc
                                color: 0x44FF88
                                width: 14
                                r_mod: -20
                                value: 0
                        - range_from: 0
                          range_to: 100
                          angle_range: 300
                          rotation: 120
                          ticks:
                            count: 0
                            length: 0
                          indicators:
                            - arc:
                                id: wifi_signal_arc
                                color: 0x4488FF
                                width: 14
                                r_mod: -40
                                value: 0

                  # Legend labels — positioned below the meter
                  - obj:
                      align: BOTTOM_MID
                      y: -15
                      width: 440
                      height: 90
                      bg_opa: 0%
                      border_width: 0
                      widgets:
                        # Row 1: CPU Temp
                        - label:
                            text: "\U000F050F"   # thermometer MDI icon
                            align: TOP_LEFT
                            x: 30
                            y: 0
                            text_font: font_icons
                            text_color: 0xFF4444
                        - label:
                            text: "CPU Temp"
                            align: TOP_LEFT
                            x: 70
                            y: 8
                            text_font: font_small
                            text_color: 0xFF4444
                        - label:
                            id: meter_val1_label
                            text: "--°C"
                            align: TOP_RIGHT
                            x: -30
                            y: 8
                            text_font: font_small
                            text_color: 0xFF4444

                        # Row 2: Uptime
                        - label:
                            text: "\U000F0019"   # flash / power MDI icon
                            align: TOP_LEFT
                            x: 30
                            y: 30
                            text_font: font_icons
                            text_color: 0x44FF88
                        - label:
                            text: "Uptime"
                            align: TOP_LEFT
                            x: 70
                            y: 38
                            text_font: font_small
                            text_color: 0x44FF88
                        - label:
                            id: meter_val2_label
                            text: "--h"
                            align: TOP_RIGHT
                            x: -30
                            y: 38
                            text_font: font_small
                            text_color: 0x44FF88

                        # Row 3: WiFi Signal
                        - label:
                            text: "\U000F05A9"   # wifi MDI icon
                            align: TOP_LEFT
                            x: 30
                            y: 60
                            text_font: font_icons
                            text_color: 0x4488FF
                        - label:
                            text: "WiFi"
                            align: TOP_LEFT
                            x: 70
                            y: 68
                            text_font: font_small
                            text_color: 0x4488FF
                        - label:
                            id: meter_val3_label
                            text: "--%"
                            align: TOP_RIGHT
                            x: -30
                            y: 68
                            text_font: font_small
                            text_color: 0x4488FF
